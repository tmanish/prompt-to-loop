document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

239,0.85);border-bottom:1px solid rgba(23,24,28,0.14);\">\n    <div style=\"display:flex;align-items:center;gap:12px;\">\n      <div style=\"position:relative;width:22px;height:22px;\">\n        <div style=\"position:absolute;inset:3px;border-radius:50%;border:1px dashed rgba(14,95,216,0.6);\"><\u002Fdiv>\n        <div style=\"position:absolute;inset:3px;animation:orbit 6s linear infinite;\">\n          <div style=\"position:absolute;width:5px;height:5px;border-radius:50%;background:#0e5fd8;top:-2.5px;left:50%;margin-left:-2.5px;\"><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <span style=\"font-weight:600;font-size:16px;letter-spacing:-0.01em;\">Loop Engineering<\u002Fspan>\n      <span style=\"font-family:'IBM Plex Mono',ui-monospace,monospace;font-size:10.5px;letter-spacing:0.1em;color:#84858c;border:1px solid rgba(23,24,28,0.16);padding:3px 7px;\">LAB · REV.01<\u002Fspan>\n    <\u002Fdiv>\n    <a href=\"#howto\" style=\"font-family:'IBM Plex Mono',ui-monospace,monospace;font-size:12px;letter-spacing:0.08em;text-decoration:none;color:#f4f3ef;background:#17181c;padding:9px 16px;border:1px solid #17181c;transition:background .2s,color .2s;\" style-hover=\"background:#0e5fd8;border-color:#0e5fd8;\">BUILD A LOOP →<\u002Fa>\n  <\u002Fheader>\n\n  <!-- ░░ 1 · HERO ░░ -->\n  <section id=\"top\" style=\"position:relative;text-align:center;padding:clamp(70px,11vh,130px) clamp(22px,6vw,40px) clamp(40px,7vh,80px);overflow:hidden;\">\n    <div style=\"position:relative;max-width:980px;margin:0 auto;\">\n      <div style=\"display:inline-flex;align-items:center;gap:10px;font-family:'IBM Plex Mono',ui-monospace,monospace;font-size:12px;letter-spacing:0.14em;color:#0e5fd8;border:1px solid rgba(14,95,216,0.35);background:rgba(14,95,216,0.05);padding:7px 14px;margin-bottom:26px;\">\n        <span style=\"width:6px;height:6px;background:#0e5fd8;animation:blink 1.8s ease-in-out infinite;\"><\u002Fspan>SPEC 001 — SYSTEMS DESIGN FOR AI AGENTS\n      <\u002Fdiv>\n      <h1 style=\"font-weight:700;font-size:clamp(46px,8.5vw,100px);line-height:1.02;letter-spacing:-0.03em;margin:0 0 24px;\">Loop <span style=\"color:#0e5fd8;\">Engineering<\u002Fspan><\u002Fh1>\n      <p style=\"font-size:clamp(19px,2.3vw,26px);line-height:1.35;font-weight:400;color:#5c5e66;max-width:640px;margin:0 auto 32px;\">Design the system that prompts the agent — instead of prompting the agent forever.<\u002Fp>\n      <div style=\"display:flex;flex-wrap:wrap;gap:12px;justify-content:center;align-items:center;\">\n        <a href=\"#anatomy\" style=\"display:inline-flex;align-items:center;text-decoration:none;font-family:'IBM Plex Mono',ui-monospace,monospace;font-size:13px;letter-spacing:0.08em;color:#f4f3ef;background:#0e5fd8;padding:13px 24px;border:1px solid #0e5fd8;transition:background .2s;\" style-hover=\"background:#17181c;border-color:#17181c;\">SEE THE LOOP<\u002Fa>\n        <a href=\"#howto\" style=\"display:inline-flex;align-items:center;gap:6px;text-decoration:none;font-family:'IBM Plex Mono',ui-monospace,monospace;font-size:13px;letter-spacing:0.08em;color:#17181c;padding:13px 24px;border:1px solid rgba(23,24,28,0.3);background:transparent;transition:border-color .2s,background .2s;\" style-hover=\"border-color:#17181c;background:rgba(23,24,28,0.04);\">BUILD ONE PRACTICALLY →<\u002Fa>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- HERO LOOP · FIG.01 -->\n    <div style=\"position:relative;display:flex;flex-direction:column;align-items:center;margin:clamp(46px,7vh,86px) auto 0;width:min(520px,88vw);\">\n      <div style=\"align-self:flex-start;font-family:'IBM Plex Mono',ui-monospace,monospace;font-size:11px;letter-spacing:0.12em;color:#84858c;margin-bottom:10px;\">FIG.01 — THE AGENT LOOP, OBSERVED<\u002Fdiv>\n      <div data-loop=\"\" data-loop-dur=\"8\" data-loop-r=\"42\" style=\"position:relative;width:100%;aspect-ratio:1;border:1px solid rgba(23,24,28,0.14);background:rgba(252,252,250,0.7);padding:0;\">\n        <div style=\"position:absolute;top:8px;left:10px;font-family:'IBM Plex Mono',ui-monospace,monospace;font-size:10px;letter-spacing:0.1em;color:#a7a8ad;\">r = 42 · t = 8.0s<\u002Fdiv>\n        <div style=\"position:absolute;inset:14%;border-radius:50%;background:radial-gradient(circle, rgba(14,95,216,0.06), transparent 70%);animation:pulseGlow 4s ease-in-out infinite;\"><\u002Fdiv>\n        <svg viewBox=\"0 0 100 100\" style=\"position:absolute;inset:0;width:100%;height:100%;overflow:visible;\">\n          <line x1=\"50\" y1=\"2\" x2=\"50\" y2=\"8\" stroke=\"rgba(23,24,28,0.2)\" stroke-width=\"0.4\"><\u002Fline>\n          <line x1=\"50\" y1=\"92\" x2=\"50\" y2=\"98\" stroke=\"rgba(23,24,28,0.2)\" stroke-width=\"0.4\"><\u002Fline>\n          <line x1=\"2\" y1=\"50\" x2=\"8\" y2=\"50\" stroke=\"rgba(23,24,28,0.2)\" stroke-width=\"0.4\"><\u002Fline>\n          <line x1=\"92\" y1=\"50\" x2=\"98\" y2=\"50\" stroke=\"rgba(23,24,28,0.2)\" stroke-width=\"0.4\"><\u002Fline>\n          <circle cx=\"50\" cy=\"50\" r=\"42\" fill=\"none\" stroke=\"rgba(23,24,28,0.12)\" stroke-width=\"0.4\" stroke-dasharray=\"1.5 2\"><\u002Fcircle>\n          <circle cx=\"50\" cy=\"50\" r=\"42\" fill=\"none\" stroke=\"rgba(14,95,216,0.5)\" stroke-width=\"0.7\"><\u002Fcircle>\n        <\u002Fsvg>\n        <!-- center intent -->\n        <div style=\"position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:52%;text-align:center;\">\n          <div style=\"font-family:'IBM Plex Mono',ui-monospace,monospace;font-size:11px;letter-spacing:0.1em;font-weight:600;color:#b97700;margin-bottom:8px;\">ONE INTENT<\u002Fdiv>\n          <div style=\"font-size:clamp(13px,1.5vw,16px);line-height:1.4;color:#17181c;font-weight:500;\">Human gives intent once. The loop handles iteration.<\u002Fdiv>\n        <\u002Fdiv>\n        <!-- nodes -->\n        <div data-loop-node=\"\" data-color=\"#0e5fd8\" style=\"position:absolute;left:50%;top:8%;transform:translate(-50%,-50%);cursor:default;\">\n          <div data-node-core=\"\" style=\"width:15px;height:15px;border-radius:50%;background:rgba(14,95,216,0.14);border:1.5px solid rgba(14,95,216,0.55);\"><\u002Fdiv>\n          <div data-node-label=\"\" style=\"position:absolute;top:calc(100% + 10px);left:50%;transform:translateX(-50%);white-space:nowrap;font-family:'IBM Plex Mono',ui-monospace,monospace;font-size:11.5px;letter-spacing:0.08em;color:#5c5e66;padding:4px 10px;background:#fcfcfa;border:1px solid rgba(23,24,28,0.18);\">GOAL<\u002Fdiv>\n        <\u002Fdiv>\n        <div data-loop-node=\"\" data-color=\"#0f8a9d\" style=\"position:absolute;left:86.4%;top:29%;transform:translate(-50%,-50%);\">\n          <div data-node-core=\"\" style=\"width:15px;height:15px;border-radius:50%;background:rgba(15,138,157,0.14);border:1.5px solid rgba(15,138,157,0.55);\"><\u002Fdiv>\n          <div data-node-label=\"\" style=\"position:absolute;top:calc(100% + 10px);left:50%;transform:translateX(-50%);white-space:nowrap;font-family:'IBM Plex Mono',ui-monospace,monospace;font-size:11.5px;letter-spacing:0.08em;color:#5c5e66;padding:4px 10px;background:#fcfcfa;border:1px solid rgba(23,24,28,0.18);\">CONTEXT<\u002Fdiv>\n        <\u002Fdiv>\n        <div data-loop-node=\"\" data-color=\"#5a55d6\" style=\"position:absolute;left:86.4%;top:71%;transform:translate(-50%,-50%);\">\n          <div data-node-core=\"\" style=\"width:15px;height:15px;border-radius:50%;background:rgba(90,85,214,0.14);border:1.5px solid rgba(90,85,214,0.55);\"><\u002Fdiv>\n          <div data-node-label=\"\" style=\"position:absolute;top:calc(100% + 10px);left:50%;transform:translateX(-50%);white-space:nowrap;font-family:'IBM Plex Mono',ui-monospace,monospace;font-size:11.5px;letter-spacing:0.08em;color:#5c5e66;padding:4px 10px;background:#fcfcfa;border:1px solid rgba(23,24,28,0.18);\">PLAN<\u002Fdiv>\n        <\u002Fdiv>\n        <div data-loop-node=\"\" data-color=\"#0e5fd8\" style=\"position:absolute;left:50%;top:92%;transform:translate(-50%,-50%);\">\n          <div data-node-core=\"\" style=\"width:15px;height:15px;border-radius:50%;background:rgba(14,95,216,0.14);border:1.5px solid rgba(14,95,216,0.55);\"><\u002Fdiv>\n          <div data-node-label=\"\" style=\"position:absolute;top:calc(100% + 10px);left:50%;transform:translateX(-50%);white-space:nowrap;font-family:'IBM Plex Mono',ui-monospace,monospace;font-size:11.5px;letter-spacing:0.08em;color:#5c5e66;padding:4px 10px;background:#fcfcfa;border:1px solid rgba(23,24,28,0.18);\">ACT<\u002Fdiv>\n        <\u002Fdiv>\n        <div data-loop-node=\"\" data-color=\"#0f8a9d\" style=\"position:absolute;left:13.6%;top:71%;transform:translate(-50%,-50%);\">\n          <div data-node-core=\"\" style=\"width:15px;height:15px;border-radius:50%;background:rgba(15,138,157,0.14);border:1.5px solid rgba(15,138,157,0.55);\"><\u002Fdiv>\n          <div data-node-label=\"\" style=\"position:absolute;top:calc(100% + 10px);left:50%;transform:translateX(-50%);white-space:nowrap;font-family:'IBM Plex Mono',ui-monospace,monospace;font-size:11.5px;letter-spacing:0.08em;color:#5c5e66;padding:4px 10px;background:#fcfcfa;border:1px solid rgba(23,24,28,0.18);\">EVALUATE<\u002Fdiv>\n        <\u002Fdiv>\n        <div data-loop-node=\"\" data-color=\"#b97700\" style=\"position:absolute;left:13.6%;top:29%;transform:translate(-50%,-50%);\">\n          <div data-node-core=\"\" style=\"width:15px;height:15px;border-radius:50%;background:rgba(185,119,0,0.14);border:1.5px solid rgba(185,119,0,0.55);\"><\u002Fdiv>\n          <div data-node-label=\"\" style=\"position:absolute;top:calc(100% + 10px);left:50%;transform:translateX(-50%);white-space:nowrap;font-family:'IBM Plex Mono',ui-monospace,monospace;font-size:11.5px;letter-spacing:0.08em;color:#5c5e66;padding:4px 10px;background:#fcfcfa;border:1px solid rgba(23,24,28,0.18);\">DECIDE<\u002Fdiv>\n        <\u002Fdiv>\n        <!-- traveling particle -->\n        <div data-loop-particle=\"\" style=\"position:absolute;left:50%;top:8%;width:11px;height:11px;border-radius:50%;background:#0e5fd8;transform:translate(-50%,-50%);box-shadow:0 0 16px 4px rgba(14,95,216,0.45);\"><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ░░ 2 · OLD WAY vs NEW WAY ░░ -->\n  <section style=\"background:#ebeae4;border-top:1px solid rgba(23,24,28,0.12);border-bottom:1px solid rgba(23,24,28,0.12);\">\n   <div style=\"position:relative;padding:clamp(70px,11vh,130px) clamp(22px,6vw,40px);max-width:1100px;margin:0 auto;\">\n    <div data-reveal=\"\" style=\"opacity:0;transform:translateY(28px);transition:opacity .9s cubic-bezier(.2,.7,.2,1),transform .9s cubic-bezier(.2,.7,.2,1);text-align:center;margin-bottom:50px;\">\n      <div style=\"font-family:'IBM Plex Mono',ui-monospace,monospace;font-size:12px;letter-spacing:0.14em;color:#0e5fd8;margin-bottom:14px;\">EXP.02 — THE SHIFT<\u002Fdiv>\n      <h2 style=\"font-weight:700;font-size:clamp(32px,5vw,54px);line-height:1.07;letter-spacing:-0.02em;margin:0;\">Stop prompting. Start designing.<\u002Fh2>\n    <\u002Fdiv>\n\n    <div style=\"display:grid;grid-template-columns:repeat(auto-fit,minmax(320px,1fr));gap:18px;align-items:stretch;\">\n      <!-- LEFT: prompt engineering / chaos -->\n      <div data-reveal=\"\" style=\"opacity:0;transform:translateY(36px);transition:opacity .9s cubic-bezier(.2,.7,.2,1),transform .9s cubic-bezier(.2,.7,.2,1);position:relative;overflow:hidden;border:1px solid rgba(23,24,28,0.18);background:#fcfcfa;padding:32px 30px 44px;min-height:420px;\">\n        <div style=\"position:absolute;top:0;left:0;font-family:'IBM Plex Mono',ui-monospace,monospace;font-size:10px;letter-spacing:0.1em;color:#a7a8ad;padding:6px 10px;border-right:1px solid rgba(23,24,28,0.12);border-bottom:1px solid rgba(23,24,28,0.12);\">SAMPLE A<\u002Fdiv>\n        <div style=\"font-family:'IBM Plex Mono',ui-monospace,monospace;font-size:11px;font-weight:600;letter-spacing:0.1em;color:#b97700;margin:14px 0 6px;\">OLD WAY<\u002Fdiv>\n        <h3 style=\"font-weight:600;font-size:26px;letter-spacing:-0.015em;margin:0 0 6px;\">Prompt Engineering<\u002Fh3>\n        <p style=\"font-size:15px;color:#7b7d84;margin:0 0 8px;line-height:1.5;\">Optimizes a single instruction. You stay in the loop — forever.<\u002Fp>\n        <div style=\"position:relative;height:268px;margin-top:8px;\">\n          <div data-reveal=\"\" data-reveal-delay=\"60\" style=\"opacity:0;transform:translate(-30px,10px) rotate(-6deg);transition:opacity .7s,transform .7s cubic-bezier(.2,.7,.2,1);position:absolute;left:2%;top:6%;padding:9px 14px;border:1px solid rgba(23,24,28,0.18);background:#f1f0eb;font-size:14px;color:#17181c;\">“Try this.”<\u002Fdiv>\n          <div data-reveal=\"\" data-reveal-delay=\"180\" style=\"opacity:0;transform:translate(40px,-6px) rotate(5deg);transition:opacity .7s,transform .7s cubic-bezier(.2,.7,.2,1);position:absolute;right:4%;top:2%;padding:9px 14px;border:1px solid rgba(23,24,28,0.18);background:#f1f0eb;font-size:14px;color:#17181c;\">“Fix that.”<\u002Fdiv>\n          <div data-reveal=\"\" data-reveal-delay=\"320\" style=\"opacity:0;transform:translate(-24px,18px) rotate(7deg);transition:opacity .7s,transform .7s cubic-bezier(.2,.7,.2,1);position:absolute;left:10%;top:36%;padding:9px 14px;border:1px solid rgba(23,24,28,0.18);background:#f1f0eb;font-size:14px;color:#17181c;\">“Check again.”<\u002Fdiv>\n          <div data-reveal=\"\" data-reveal-delay=\"460\" style=\"opacity:0;transform:translate(30px,16px) rotate(-4deg);transition:opacity .7s,transform .7s cubic-bezier(.2,.7,.2,1);position:absolute;right:2%;top:40%;padding:9px 14px;border:1px solid rgba(23,24,28,0.18);background:#f1f0eb;font-size:14px;color:#17181c;\">“Now update this.”<\u002Fdiv>\n          <div data-reveal=\"\" data-reveal-delay=\"600\" style=\"opacity:0;transform:translate(-12px,22px) rotate(-8deg);transition:opacity .7s,transform .7s cubic-bezier(.2,.7,.2,1);position:absolute;left:24%;top:66%;padding:9px 14px;border:1px solid rgba(23,24,28,0.18);background:#f1f0eb;font-size:14px;color:#17181c;\">“No, again.”<\u002Fdiv>\n          <div data-reveal=\"\" data-reveal-delay=\"740\" style=\"opacity:0;transform:translate(20px,10px) rotate(6deg);transition:opacity .7s,transform .7s cubic-bezier(.2,.7,.2,1);position:absolute;right:14%;top:70%;padding:9px 14px;border:1px solid rgba(185,119,0,0.45);background:rgba(185,119,0,0.1);font-size:14px;color:#8f5c00;\">“Still wrong…”<\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"position:absolute;bottom:16px;left:30px;font-family:'IBM Plex Mono',ui-monospace,monospace;font-size:10.5px;letter-spacing:0.1em;color:#b97700;\">MANUAL · REPETITIVE · TIRING<\u002Fdiv>\n      <\u002Fdiv>\n\n      <!-- RIGHT: loop engineering / order -->\n      <div data-reveal=\"\" data-reveal-delay=\"120\" style=\"opacity:0;transform:translateY(36px);transition:opacity .9s cubic-bezier(.2,.7,.2,1),transform .9s cubic-bezier(.2,.7,.2,1);position:relative;overflow:hidden;border:1px solid rgba(23,24,28,0.18);background:#fcfcfa;padding:32px 30px 44px;min-height:420px;\">\n        <div style=\"position:absolute;top:0;left:0;font-family:'IBM Plex Mono',ui-monospace,monospace;font-size:10px;letter-spacing:0.1em;color:#a7a8ad;padding:6px 10px;border-right:1px solid rgba(23,24,28,0.12);border-bottom:1px solid rgba(23,24,28,0.12);\">SAMPLE B<\u002Fdiv>\n        <div style=\"font-family:'IBM Plex Mono',ui-monospace,monospace;font-size:11px;font-weight:600;letter-spacing:0.1em;color:#0e5fd8;margin:14px 0 6px;\">NEW WAY<\u002Fdiv>\n        <h3 style=\"font-weight:600;font-size:26px;letter-spacing:-0.015em;margin:0 0 6px;\">Loop Engineering<\u002Fh3>\n        <p style=\"font-size:15px;color:#7b7d84;margin:0 0 20px;line-height:1.5;\">Designs the repeatable behavior around the agent. Define it once — it runs itself.<\u002Fp>\n        <div style=\"display:flex;flex-direction:column;gap:8px;\">\n          <div data-reveal=\"\" data-reveal-delay=\"80\" style=\"opacity:0;transform:translateX(26px);transition:opacity .6s,transform .6s cubic-bezier(.2,.7,.2,1);display:flex;align-items:center;justify-content:space-between;padding:13px 16px;border:1px solid rgba(23,24,28,0.12);background:#f1f0eb;\"><span style=\"font-weight:600;font-size:15px;\">Goal<\u002Fspan><span style=\"font-family:'IBM Plex Mono',ui-monospace,monospace;font-size:11px;letter-spacing:0.08em;color:#0e5fd8;\">DEFINED<\u002Fspan><\u002Fdiv>\n          <div data-reveal=\"\" data-reveal-delay=\"160\" style=\"opacity:0;transform:translateX(26px);transition:opacity .6s,transform .6s cubic-bezier(.2,.7,.2,1);display:flex;align-items:center;justify-content:space-between;padding:13px 16px;border:1px solid rgba(23,24,28,0.12);background:#f1f0eb;\"><span style=\"font-weight:600;font-size:15px;\">Rules<\u002Fspan><span style=\"font-family:'IBM Plex Mono',ui-monospace,monospace;font-size:11px;letter-spacing:0.08em;color:#0f8a9d;\">SET<\u002Fspan><\u002Fdiv>\n          <div data-reveal=\"\" data-reveal-delay=\"240\" style=\"opacity:0;transform:translateX(26px);transition:opacity .6s,transform .6s cubic-bezier(.2,.7,.2,1);display:flex;align-items:center;justify-content:space-between;padding:13px 16px;border:1px solid rgba(23,24,28,0.12);background:#f1f0eb;\"><span style=\"font-weight:600;font-size:15px;\">Tools<\u002Fspan><span style=\"font-family:'IBM Plex Mono',ui-monospace,monospace;font-size:11px;letter-spacing:0.08em;color:#5a55d6;\">WIRED<\u002Fspan><\u002Fdiv>\n          <div data-reveal=\"\" data-reveal-delay=\"320\" style=\"opacity:0;transform:translateX(26px);transition:opacity .6s,transform .6s cubic-bezier(.2,.7,.2,1);display:flex;align-items:center;justify-content:space-between;padding:13px 16px;border:1px solid rgba(23,24,28,0.12);background:#f1f0eb;\"><span style=\"font-weight:600;font-size:15px;\">Evaluator<\u002Fspan><span style=\"font-family:'IBM Plex Mono',ui-monospace,monospace;font-size:11px;letter-spacing:0.08em;color:#0f8a9d;\">SCORING<\u002Fspan><\u002Fdiv>\n          <div data-reveal=\"\" data-reveal-delay=\"400\" style=\"opacity:0;transform:translateX(26px);transition:opacity .6s,transform .6s cubic-bezier(.2,.7,.2,1);display:flex;align-items:center;justify-content:space-between;padding:13px 16px;border:1px solid rgba(185,119,0,0.35);background:rgba(185,119,0,0.07);\"><span style=\"font-weight:600;font-size:15px;\">Stop condition<\u002Fspan><span style=\"font-family:'IBM Plex Mono',ui-monospace,monospace;font-size:11px;letter-spacing:0.08em;color:#b97700;\">ARMED<\u002Fspan><\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"margin-top:20px;display:flex;align-items:center;gap:10px;font-family:'IBM Plex Mono',ui-monospace,monospace;font-size:10.5px;letter-spacing:0.1em;color:#0e5fd8;\"><span style=\"width:7px;height:7px;background:#0e5fd8;animation:blink 1.6s ease-in-out infinite;\"><\u002Fspan>SELF-RUNNING · BOUNDED · AUDITABLE<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <p data-reveal=\"\" style=\"opacity:0;transform:translateY(20px);transition:opacity .8s,transform .8s;max-width:760px;margin:50px auto 0;text-align:center;font-weight:500;font-size:26px;line-height:1.34;letter-spacing:-0.015em;color:#84858c;\">Prompt engineering asks better questions.<br><span style=\"color:#17181c;\">Loop engineering designs the machine that keeps asking, checking, improving, and stopping.<\u002Fspan><\u002Fp>\n   <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ░░ 3 · WHAT MAKES A LOOP ░░ -->\n  <section id=\"anatomy\" style=\"position:relative;padding:clamp(70px,11vh,130px) clamp(22px,6vw,40px);max-width:1140px;margin:0 auto;\">\n    <div data-reveal=\"\" style=\"opacity:0;transform:translateY(28px);transition:opacity .9s cubic-bezier(.2,.7,.2,1),transform .9s cubic-bezier(.2,.7,.2,1);text-align:center;margin-bottom:54px;\">\n      <div style=\"font-family:'IBM Plex Mono',ui-monospace,monospace;font-size:12px;letter-spacing:0.14em;color:#0e5fd8;margin-bottom:14px;\">EXP.03 — ANATOMY<\u002Fdiv>\n      <h2 style=\"font-weight:700;font-size:clamp(32px,5vw,54px);line-height:1.07;letter-spacing:-0.02em;margin:0 0 16px;\">What makes a loop<\u002Fh2>\n      <p style=\"font-size:20px;color:#5c5e66;max-width:560px;margin:0 auto;line-height:1.45;\">Six parts wrap the agent core. Each answers one question.<\u002Fp>\n    <\u002Fdiv>\n    <div style=\"display:grid;grid-template-columns:repeat(auto-fit,minmax(290px,1fr));gap:16px;\">\n      <div data-reveal=\"\" data-reveal-delay=\"0\" style=\"opacity:0;transform:translateY(40px);transition:opacity .8s,transform .8s cubic-bezier(.2,.7,.2,1),border-color .25s,box-shadow .25s;border:1px solid rgba(23,24,28,0.16);background:#fcfcfa;padding:26px;\" style-hover=\"border-color:rgba(14,95,216,0.6);box-shadow:0 10px 34px -22px rgba(14,95,216,0.5);\">\n        <div style=\"display:flex;align-items:center;gap:12px;margin-bottom:14px;\"><span style=\"width:34px;height:34px;display:flex;align-items:center;justify-content:center;background:rgba(14,95,216,0.09);border:1px solid rgba(14,95,216,0.35);color:#0e5fd8;font-family:'IBM Plex Mono',ui-monospace,monospace;font-weight:600;font-size:14px;\">A<\u002Fspan><h3 style=\"font-weight:600;font-size:21px;letter-spacing:-0.01em;margin:0;\">Goal<\u002Fh3><\u002Fdiv>\n        <p style=\"font-size:15px;color:#5c5e66;line-height:1.5;margin:0 0 14px;\">What should the system achieve?<\u002Fp>\n        <div style=\"font-size:13.5px;line-height:1.55;color:#5c5e66;padding:12px 14px;border:1px dashed rgba(23,24,28,0.22);background:#f4f3ef;\"><span style=\"font-family:'IBM Plex Mono',ui-monospace,monospace;color:#0e5fd8;font-weight:600;font-size:10px;letter-spacing:0.1em;\">EXAMPLE<\u002Fspan><br>Reduce unresolved support tickets by finding likely root causes and proposing fixes.<\u002Fdiv>\n      <\u002Fdiv>\n      <div data-reveal=\"\" data-reveal-delay=\"90\" style=\"opacity:0;transform:translateY(40px);transition:opacity .8s,transform .8s cubic-bezier(.2,.7,.2,1),border-color .25s,box-shadow .25s;border:1px solid rgba(23,24,28,0.16);background:#fcfcfa;padding:26px;\" style-hover=\"border-color:rgba(15,138,157,0.6);box-shadow:0 10px 34px -22px rgba(15,138,157,0.5);\">\n        <div style=\"display:flex;align-items:center;gap:12px;margin-bottom:14px;\"><span style=\"width:34px;height:34px;display:flex;align-items:center;justify-content:center;background:rgba(15,138,157,0.1);border:1px solid rgba(15,138,157,0.35);color:#0f8a9d;font-family:'IBM Plex Mono',ui-monospace,monospace;font-weight:600;font-size:14px;\">B<\u002Fspan><h3 style=\"font-weight:600;font-size:21px;letter-spacing:-0.01em;margin:0;\">Context<\u002Fh3><\u002Fdiv>\n        <p style=\"font-size:15px;color:#5c5e66;line-height:1.5;margin:0 0 14px;\">What does the agent need to know?<\u002Fp>\n        <div style=\"font-size:13.5px;line-height:1.55;color:#5c5e66;padding:12px 14px;border:1px dashed rgba(23,24,28,0.22);background:#f4f3ef;\"><span style=\"font-family:'IBM Plex Mono',ui-monospace,monospace;color:#0f8a9d;font-weight:600;font-size:10px;letter-spacing:0.1em;\">EXAMPLE<\u002Fspan><br>Ticket history, logs, customer plan, error messages, past resolutions.<\u002Fdiv>\n      <\u002Fdiv>\n      <div data-reveal=\"\" data-reveal-delay=\"180\" style=\"opacity:0;transform:translateY(40px);transition:opacity .8s,transform .8s cubic-bezier(.2,.7,.2,1),border-color .25s,box-shadow .25s;border:1px solid rgba(23,24,28,0.16);background:#fcfcfa;padding:26px;\" style-hover=\"border-color:rgba(90,85,214,0.6);box-shadow:0 10px 34px -22px rgba(90,85,214,0.5);\">\n        <div style=\"display:flex;align-items:center;gap:12px;margin-bottom:14px;\"><span style=\"width:34px;height:34px;display:flex;align-items:center;justify-content:center;background:rgba(90,85,214,0.1);border:1px solid rgba(90,85,214,0.35);color:#5a55d6;font-family:'IBM Plex Mono',ui-monospace,monospace;font-weight:600;font-size:14px;\">C<\u002Fspan><h3 style=\"font-weight:600;font-size:21px;letter-spacing:-0.01em;margin:0;\">Tools<\u002Fh3><\u002Fdiv>\n        <p style=\"font-size:15px;color:#5c5e66;line-height:1.5;margin:0 0 14px;\">What can the agent use?<\u002Fp>\n        <div style=\"font-size:13.5px;line-height:1.55;color:#5c5e66;padding:12px 14px;border:1px dashed rgba(23,24,28,0.22);background:#f4f3ef;\"><span style=\"font-family:'IBM Plex Mono',ui-monospace,monospace;color:#5a55d6;font-weight:600;font-size:10px;letter-spacing:0.1em;\">EXAMPLE<\u002Fspan><br>Search logs, query database, open Jira ticket, draft customer response.<\u002Fdiv>\n      <\u002Fdiv>\n      <div data-reveal=\"\" data-reveal-delay=\"60\" style=\"opacity:0;transform:translateY(40px);transition:opacity .8s,transform .8s cubic-bezier(.2,.7,.2,1),border-color .25s,box-shadow .25s;border:1px solid rgba(23,24,28,0.16);background:#fcfcfa;padding:26px;\" style-hover=\"border-color:rgba(15,138,157,0.6);box-shadow:0 10px 34px -22px rgba(15,138,157,0.5);\">\n        <div style=\"display:flex;align-items:center;gap:12px;margin-bottom:14px;\"><span style=\"width:34px;height:34px;display:flex;align-items:center;justify-content:center;background:rgba(15,138,157,0.1);border:1px solid rgba(15,138,157,0.35);color:#0f8a9d;font-family:'IBM Plex Mono',ui-monospace,monospace;font-weight:600;font-size:14px;\">D<\u002Fspan><h3 style=\"font-weight:600;font-size:21px;letter-spacing:-0.01em;margin:0;\">Evaluator<\u002Fh3><\u002Fdiv>\n        <p style=\"font-size:15px;color:#5c5e66;line-height:1.5;margin:0 0 14px;\">How do we know if the output is good?<\u002Fp>\n        <div style=\"font-size:13.5px;line-height:1.55;color:#5c5e66;padding:12px 14px;border:1px dashed rgba(23,24,28,0.22);background:#f4f3ef;\"><span style=\"font-family:'IBM Plex Mono',ui-monospace,monospace;color:#0f8a9d;font-weight:600;font-size:10px;letter-spacing:0.1em;\">EXAMPLE<\u002Fspan><br>Does the answer cite evidence? Did the fix pass tests? Is confidence high enough?<\u002Fdiv>\n      <\u002Fdiv>\n      <div data-reveal=\"\" data-reveal-delay=\"150\" style=\"opacity:0;transform:translateY(40px);transition:opacity .8s,transform .8s cubic-bezier(.2,.7,.2,1),border-color .25s,box-shadow .25s;border:1px solid rgba(23,24,28,0.16);background:#fcfcfa;padding:26px;\" style-hover=\"border-color:rgba(14,95,216,0.6);box-shadow:0 10px 34px -22px rgba(14,95,216,0.5);\">\n        <div style=\"display:flex;align-items:center;gap:12px;margin-bottom:14px;\"><span style=\"width:34px;height:34px;display:flex;align-items:center;justify-content:center;background:rgba(14,95,216,0.09);border:1px solid rgba(14,95,216,0.35);color:#0e5fd8;font-family:'IBM Plex Mono',ui-monospace,monospace;font-weight:600;font-size:14px;\">E<\u002Fspan><h3 style=\"font-weight:600;font-size:21px;letter-spacing:-0.01em;margin:0;\">Memory<\u002Fh3><\u002Fdiv>\n        <p style=\"font-size:15px;color:#5c5e66;line-height:1.5;margin:0 0 14px;\">What should the loop remember?<\u002Fp>\n        <div style=\"font-size:13.5px;line-height:1.55;color:#5c5e66;padding:12px 14px;border:1px dashed rgba(23,24,28,0.22);background:#f4f3ef;\"><span style=\"font-family:'IBM Plex Mono',ui-monospace,monospace;color:#0e5fd8;font-weight:600;font-size:10px;letter-spacing:0.1em;\">EXAMPLE<\u002Fspan><br>Failed attempts, known bugs, customer-specific constraints, successful patterns.<\u002Fdiv>\n      <\u002Fdiv>\n      <div data-reveal=\"\" data-reveal-delay=\"240\" style=\"opacity:0;transform:translateY(40px);transition:opacity .8s,transform .8s cubic-bezier(.2,.7,.2,1),border-color .25s,box-shadow .25s;border:1px solid rgba(185,119,0,0.4);background:#fcfcfa;padding:26px;\" style-hover=\"border-color:rgba(185,119,0,0.7);box-shadow:0 10px 34px -22px rgba(185,119,0,0.5);\">\n        <div style=\"display:flex;align-items:center;gap:12px;margin-bottom:14px;\"><span style=\"width:34px;height:34px;display:flex;align-items:center;justify-content:center;background:rgba(185,119,0,0.1);border:1px solid rgba(185,119,0,0.4);color:#b97700;font-family:'IBM Plex Mono',ui-monospace,monospace;font-weight:600;font-size:14px;\">F<\u002Fspan><h3 style=\"font-weight:600;font-size:21px;letter-spacing:-0.01em;margin:0;\">Stop / Escalate<\u002Fh3><\u002Fdiv>\n        <p style=\"font-size:15px;color:#5c5e66;line-height:1.5;margin:0 0 14px;\">When should it stop, retry, or ask a human?<\u002Fp>\n        <div style=\"font-size:13.5px;line-height:1.55;color:#5c5e66;padding:12px 14px;border:1px dashed rgba(185,119,0,0.4);background:rgba(185,119,0,0.06);\"><span style=\"font-family:'IBM Plex Mono',ui-monospace,monospace;color:#b97700;font-weight:600;font-size:10px;letter-spacing:0.1em;\">EXAMPLE<\u002Fspan><br>Stop after 3 failed attempts or escalate if confidence is below 80%.<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ░░ 4 · PRACTICAL EXAMPLE ░░ -->\n  <section style=\"background:#ebeae4;border-top:1px solid rgba(23,24,28,0.12);border-bottom:1px solid rgba(23,24,28,0.12);\">\n   <div style=\"position:relative;padding:clamp(70px,11vh,130px) clamp(22px,6vw,40px);max-width:1040px;margin:0 auto;\">\n    <div data-reveal=\"\" style=\"opacity:0;transform:translateY(28px);transition:opacity .9s cubic-bezier(.2,.7,.2,1),transform .9s cubic-bezier(.2,.7,.2,1);margin-bottom:48px;text-align:center;\">\n      <div style=\"font-family:'IBM Plex Mono',ui-monospace,monospace;font-size:12px;letter-spacing:0.14em;color:#0e5fd8;margin-bottom:14px;\">EXP.04 — WALK-THROUGH<\u002Fdiv>\n      <h2 style=\"font-weight:700;font-size:clamp(30px,4.6vw,50px);line-height:1.08;letter-spacing:-0.02em;margin:0 0 20px;\">Support Ticket Resolution Loop<\u002Fh2>\n      <div data-reveal=\"\" data-reveal-delay=\"120\" style=\"opacity:0;transform:translateY(20px);transition:opacity .8s,transform .8s;display:inline-flex;align-items:center;gap:14px;padding:13px 20px;border:1px solid rgba(23,24,28,0.2);background:#fcfcfa;\">\n        <span style=\"font-family:'IBM Plex Mono',ui-monospace,monospace;font-size:10px;font-weight:600;letter-spacing:0.12em;color:#b97700;\">TICKET<\u002Fspan>\n        <span style=\"font-size:16px;color:#17181c;\">“The dashboard is not loading after login.”<\u002Fspan>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- vertical step rail -->\n    <div style=\"position:relative;display:flex;flex-direction:column;gap:14px;\">\n      <div data-reveal=\"\" style=\"opacity:0;transform:translateY(34px);transition:opacity .8s,transform .8s cubic-bezier(.2,.7,.2,1);display:grid;grid-template-columns:auto 1fr;gap:18px;align-items:stretch;\">\n        <div style=\"display:flex;flex-direction:column;align-items:center;gap:8px;\"><span style=\"width:44px;height:44px;flex:0 0 auto;display:flex;align-items:center;justify-content:center;border:1px solid rgba(14,95,216,0.4);background:rgba(14,95,216,0.07);color:#0e5fd8;font-family:'IBM Plex Mono',ui-monospace,monospace;font-weight:600;font-size:13px;\">01<\u002Fspan><div style=\"width:1px;flex:1;min-height:24px;background:rgba(23,24,28,0.2);\"><\u002Fdiv><\u002Fdiv>\n        <div style=\"border:1px solid rgba(23,24,28,0.16);background:#fcfcfa;padding:22px 24px;\">\n          <div style=\"display:flex;align-items:center;gap:12px;margin-bottom:8px;flex-wrap:wrap;\"><h3 style=\"font-weight:600;font-size:22px;letter-spacing:-0.01em;margin:0;\">Intake<\u002Fh3><span style=\"font-family:'IBM Plex Mono',ui-monospace,monospace;font-size:10.5px;letter-spacing:0.1em;color:#0e5fd8;\">GATHER CONTEXT<\u002Fspan><\u002Fdiv>\n          <p style=\"font-size:15px;color:#5c5e66;line-height:1.5;margin:0 0 14px;\">Agent reads the ticket, account info, logs, and recent deploy history.<\u002Fp>\n          <div style=\"display:flex;flex-wrap:wrap;gap:7px;\">\n            <span style=\"font-family:'IBM Plex Mono',ui-monospace,monospace;font-size:11.5px;padding:6px 11px;border:1px solid rgba(14,95,216,0.35);background:rgba(14,95,216,0.05);color:#0e5fd8;\">ticket<\u002Fspan>\n            <span style=\"font-family:'IBM Plex Mono',ui-monospace,monospace;font-size:11.5px;padding:6px 11px;border:1px solid rgba(14,95,216,0.35);background:rgba(14,95,216,0.05);color:#0e5fd8;\">account<\u002Fspan>\n            <span style=\"font-family:'IBM Plex Mono',ui-monospace,monospace;font-size:11.5px;padding:6px 11px;border:1px solid rgba(14,95,216,0.35);background:rgba(14,95,216,0.05);color:#0e5fd8;\">app_logs<\u002Fspan>\n            <span style=\"font-family:'IBM Plex Mono',ui-monospace,monospace;font-size:11.5px;padding:6px 11px;border:1px solid rgba(14,95,216,0.35);background:rgba(14,95,216,0.05);color:#0e5fd8;\">deploy_history<\u002Fspan>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div data-reveal=\"\" style=\"opacity:0;transform:translateY(34px);transition:opacity .8s,transform .8s cubic-bezier(.2,.7,.2,1);display:grid;grid-template-columns:auto 1fr;gap:18px;align-items:stretch;\">\n        <div style=\"display:flex;flex-direction:column;align-items:center;gap:8px;\"><span style=\"width:44px;height:44px;flex:0 0 auto;display:flex;align-items:center;justify-content:center;border:1px solid rgba(90,85,214,0.4);background:rgba(90,85,214,0.07);color:#5a55d6;font-family:'IBM Plex Mono',ui-monospace,monospace;font-weight:600;font-size:13px;\">02<\u002Fspan><div style=\"width:1px;flex:1;min-height:24px;background:rgba(23,24,28,0.2);\"><\u002Fdiv><\u002Fdiv>\n        <div style=\"border:1px solid rgba(23,24,28,0.16);background:#fcfcfa;padding:22px 24px;\">\n          <div style=\"display:flex;align-items:center;gap:12px;margin-bottom:8px;flex-wrap:wrap;\"><h3 style=\"font-weight:600;font-size:22px;letter-spacing:-0.01em;margin:0;\">Hypothesis<\u002Fh3><span style=\"font-family:'IBM Plex Mono',ui-monospace,monospace;font-size:10.5px;letter-spacing:0.1em;color:#5a55d6;\">REASON<\u002Fspan><\u002Fdiv>\n          <p style=\"font-size:15px;color:#5c5e66;line-height:1.5;margin:0 0 14px;\">Agent proposes a likely cause to investigate.<\u002Fp>\n          <div style=\"font-size:15px;line-height:1.55;color:#17181c;padding:14px 16px;border-left:2px solid #5a55d6;border-top:1px solid rgba(90,85,214,0.25);border-right:1px solid rgba(90,85,214,0.25);border-bottom:1px solid rgba(90,85,214,0.25);background:rgba(90,85,214,0.05);\">“Dashboard API timeout likely caused by recent permissions service change.”<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div data-reveal=\"\" style=\"opacity:0;transform:translateY(34px);transition:opacity .8s,transform .8s cubic-bezier(.2,.7,.2,1);display:grid;grid-template-columns:auto 1fr;gap:18px;align-items:stretch;\">\n        <div style=\"display:flex;flex-direction:column;align-items:center;gap:8px;\"><span style=\"width:44px;height:44px;flex:0 0 auto;display:flex;align-items:center;justify-content:center;border:1px solid rgba(15,138,157,0.4);background:rgba(15,138,157,0.07);color:#0f8a9d;font-family:'IBM Plex Mono',ui-monospace,monospace;font-weight:600;font-size:13px;\">03<\u002Fspan><div style=\"width:1px;flex:1;min-height:24px;background:rgba(23,24,28,0.2);\"><\u002Fdiv><\u002Fdiv>\n        <div style=\"border:1px solid rgba(23,24,28,0.16);background:#fcfcfa;padding:22px 24px;\">\n          <div style=\"display:flex;align-items:center;gap:12px;margin-bottom:8px;flex-wrap:wrap;\"><h3 style=\"font-weight:600;font-size:22px;letter-spacing:-0.01em;margin:0;\">Action<\u002Fh3><span style=\"font-family:'IBM Plex Mono',ui-monospace,monospace;font-size:10.5px;letter-spacing:0.1em;color:#0f8a9d;\">USE TOOLS<\u002Fspan><\u002Fdiv>\n          <p style=\"font-size:15px;color:#5c5e66;line-height:1.5;margin:0 0 14px;\">Agent queries logs, checks error traces, compares similar tickets, and drafts a fix path.<\u002Fp>\n          <div style=\"display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:7px;\">\n            <div style=\"display:flex;align-items:center;gap:8px;padding:10px 12px;border:1px solid rgba(23,24,28,0.12);background:#f4f3ef;font-family:'IBM Plex Mono',ui-monospace,monospace;font-size:12px;color:#17181c;\"><span style=\"width:6px;height:6px;background:#0f8a9d;\"><\u002Fspan>query logs<\u002Fdiv>\n            <div style=\"display:flex;align-items:center;gap:8px;padding:10px 12px;border:1px solid rgba(23,24,28,0.12);background:#f4f3ef;font-family:'IBM Plex Mono',ui-monospace,monospace;font-size:12px;color:#17181c;\"><span style=\"width:6px;height:6px;background:#0f8a9d;\"><\u002Fspan>error traces<\u002Fdiv>\n            <div style=\"display:flex;align-items:center;gap:8px;padding:10px 12px;border:1px solid rgba(23,24,28,0.12);background:#f4f3ef;font-family:'IBM Plex Mono',ui-monospace,monospace;font-size:12px;color:#17181c;\"><span style=\"width:6px;height:6px;background:#0f8a9d;\"><\u002Fspan>similar tickets<\u002Fdiv>\n            <div style=\"display:flex;align-items:center;gap:8px;padding:10px 12px;border:1px solid rgba(23,24,28,0.12);background:#f4f3ef;font-family:'IBM Plex Mono',ui-monospace,monospace;font-size:12px;color:#17181c;\"><span style=\"width:6px;height:6px;background:#0f8a9d;\"><\u002Fspan>draft fix path<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div data-reveal=\"\" style=\"opacity:0;transform:translateY(34px);transition:opacity .8s,transform .8s cubic-bezier(.2,.7,.2,1);display:grid;grid-template-columns:auto 1fr;gap:18px;align-items:stretch;\">\n        <div style=\"display:flex;flex-direction:column;align-items:center;gap:8px;\"><span style=\"width:44px;height:44px;flex:0 0 auto;display:flex;align-items:center;justify-content:center;border:1px solid rgba(185,119,0,0.45);background:rgba(185,119,0,0.07);color:#b97700;font-family:'IBM Plex Mono',ui-monospace,monospace;font-weight:600;font-size:13px;\">04<\u002Fspan><div style=\"width:1px;flex:1;min-height:24px;background:rgba(23,24,28,0.2);\"><\u002Fdiv><\u002Fdiv>\n        <div style=\"border:1px solid rgba(23,24,28,0.16);background:#fcfcfa;padding:22px 24px;\">\n          <div style=\"display:flex;align-items:center;gap:12px;margin-bottom:16px;flex-wrap:wrap;\"><h3 style=\"font-weight:600;font-size:22px;letter-spacing:-0.01em;margin:0;\">Evaluation<\u002Fh3><span style=\"font-family:'IBM Plex Mono',ui-monospace,monospace;font-size:10.5px;letter-spacing:0.1em;color:#b97700;\">SCORE THE RESULT<\u002Fspan><\u002Fdiv>\n          <div style=\"display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:8px;margin-bottom:18px;\">\n            <div style=\"padding:12px 14px;border:1px solid rgba(23,24,28,0.12);background:#f4f3ef;\"><div style=\"font-family:'IBM Plex Mono',ui-monospace,monospace;font-size:10px;letter-spacing:0.08em;color:#84858c;margin-bottom:5px;\">EVIDENCE FOUND?<\u002Fdiv><div style=\"font-weight:600;color:#0f8a9d;font-size:14px;\">Yes · 4 sources<\u002Fdiv><\u002Fdiv>\n            <div style=\"padding:12px 14px;border:1px solid rgba(23,24,28,0.12);background:#f4f3ef;\"><div style=\"font-family:'IBM Plex Mono',ui-monospace,monospace;font-size:10px;letter-spacing:0.08em;color:#84858c;margin-bottom:5px;\">SIMILAR INCIDENTS?<\u002Fdiv><div style=\"font-weight:600;color:#0f8a9d;font-size:14px;\">3 matched<\u002Fdiv><\u002Fdiv>\n            <div style=\"padding:12px 14px;border:1px solid rgba(23,24,28,0.12);background:#f4f3ef;\"><div style=\"font-family:'IBM Plex Mono',ui-monospace,monospace;font-size:10px;letter-spacing:0.08em;color:#84858c;margin-bottom:5px;\">RISK LEVEL<\u002Fdiv><div style=\"font-weight:600;color:#b97700;font-size:14px;\">Medium<\u002Fdiv><\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;\"><span style=\"font-family:'IBM Plex Mono',ui-monospace,monospace;font-size:10.5px;letter-spacing:0.08em;color:#5c5e66;\">CONFIDENCE SCORE<\u002Fspan><span data-count=\"86\" data-count-suffix=\"%\" style=\"font-family:'IBM Plex Mono',ui-monospace,monospace;font-weight:600;color:#0e5fd8;font-size:15px;\">0%<\u002Fspan><\u002Fdiv>\n          <div style=\"height:10px;border:1px solid rgba(23,24,28,0.18);background:#f4f3ef;overflow:hidden;\"><div data-grow=\"86%\" data-grow-axis=\"width\" style=\"height:100%;width:0;background:repeating-linear-gradient(-45deg,#0e5fd8 0 6px,#3a80e2 6px 12px);transition:width 1.2s cubic-bezier(.2,.7,.2,1);\"><\u002Fdiv><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div data-reveal=\"\" style=\"opacity:0;transform:translateY(34px);transition:opacity .8s,transform .8s cubic-bezier(.2,.7,.2,1);display:grid;grid-template-columns:auto 1fr;gap:18px;align-items:start;\">\n        <div style=\"display:flex;flex-direction:column;align-items:center;gap:8px;\"><span style=\"width:44px;height:44px;flex:0 0 auto;display:flex;align-items:center;justify-content:center;border:1px solid rgba(14,95,216,0.4);background:rgba(14,95,216,0.07);color:#0e5fd8;font-family:'IBM Plex Mono',ui-monospace,monospace;font-weight:600;font-size:13px;\">05<\u002Fspan><\u002Fdiv>\n        <div style=\"border:1px solid rgba(23,24,28,0.16);background:#fcfcfa;padding:22px 24px;\">\n          <div style=\"display:flex;align-items:center;gap:12px;margin-bottom:16px;flex-wrap:wrap;\"><h3 style=\"font-weight:600;font-size:22px;letter-spacing:-0.01em;margin:0;\">Decision<\u002Fh3><span style=\"font-family:'IBM Plex Mono',ui-monospace,monospace;font-size:10.5px;letter-spacing:0.1em;color:#0e5fd8;\">BRANCH<\u002Fspan><\u002Fdiv>\n          <div style=\"display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:10px;\">\n            <div style=\"padding:16px;border:1px solid rgba(30,138,74,0.35);background:rgba(30,138,74,0.05);\"><div style=\"font-family:'IBM Plex Mono',ui-monospace,monospace;font-weight:600;color:#1e8a4a;margin-bottom:6px;font-size:13px;\">→ RESOLVE<\u002Fdiv><div style=\"font-size:13px;color:#5c5e66;line-height:1.45;\">Confidence high. Draft response + create engineering ticket.<\u002Fdiv><\u002Fdiv>\n            <div style=\"padding:16px;border:1px solid rgba(90,85,214,0.35);background:rgba(90,85,214,0.05);\"><div style=\"font-family:'IBM Plex Mono',ui-monospace,monospace;font-weight:600;color:#5a55d6;margin-bottom:6px;font-size:13px;\">↺ RETRY<\u002Fdiv><div style=\"font-size:13px;color:#5c5e66;line-height:1.45;\">Evidence missing. Loop back and gather more context.<\u002Fdiv><\u002Fdiv>\n            <div style=\"padding:16px;border:1px solid rgba(185,119,0,0.4);background:rgba(185,119,0,0.06);\"><div style=\"font-family:'IBM Plex Mono',ui-monospace,monospace;font-weight:600;color:#b97700;margin-bottom:6px;font-size:13px;\">⚠ ESCALATE<\u002Fdiv><div style=\"font-size:13px;color:#5c5e66;line-height:1.45;\">Confidence low or risky. Ask a human reviewer.<\u002Fdiv><\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <p data-reveal=\"\" style=\"opacity:0;transform:translateY(20px);transition:opacity .8s,transform .8s;text-align:center;font-size:17px;color:#84858c;margin:40px auto 0;max-width:560px;line-height:1.5;\">Not “AI magic” — a controlled system with checks, memory, and stopping rules.<\u002Fp>\n   <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ░░ 5 · PROMPT vs LOOP SPEC ░░ -->\n  <section style=\"position:relative;padding:clamp(70px,11vh,130px) clamp(22px,6vw,40px);max-width:1000px;margin:0 auto;\">\n    <div data-reveal=\"\" style=\"opacity:0;transform:translateY(28px);transition:opacity .9s cubic-bezier(.2,.7,.2,1),transform .9s cubic-bezier(.2,.7,.2,1);text-align:center;margin-bottom:46px;\">\n      <div style=\"font-family:'IBM Plex Mono',ui-monospace,monospace;font-size:12px;letter-spacing:0.14em;color:#0e5fd8;margin-bottom:14px;\">EXP.05 — PROMPT VS LOOP<\u002Fdiv>\n      <h2 style=\"font-weight:700;font-size:clamp(30px,4.6vw,50px);line-height:1.08;letter-spacing:-0.02em;margin:0;\">One line becomes a system<\u002Fh2>\n    <\u002Fdiv>\n\n    <!-- the dissolving prompt -->\n    <div data-reveal=\"\" style=\"opacity:0;transform:translateY(22px) scale(0.98);transition:opacity .9s,transform .9s cubic-bezier(.2,.7,.2,1);max-width:620px;margin:0 auto 18px;padding:18px 22px;border:1px solid rgba(185,119,0,0.45);background:rgba(185,119,0,0.06);display:flex;align-items:center;gap:14px;\">\n      <span style=\"font-family:'IBM Plex Mono',ui-monospace,monospace;font-size:10px;font-weight:600;letter-spacing:0.12em;color:#b97700;flex:0 0 auto;\">PROMPT<\u002Fspan>\n      <span style=\"font-size:15.5px;color:#17181c;\">“Analyze this support ticket and tell me what to do.”<\u002Fspan>\n    <\u002Fdiv>\n    <div data-reveal=\"\" style=\"opacity:0;transition:opacity .8s;text-align:center;font-family:'IBM Plex Mono',ui-monospace,monospace;font-size:11px;letter-spacing:0.14em;color:#84858c;margin-bottom:18px;\">↓ DISSOLVES INTO ↓<\u002Fdiv>\n\n    <!-- structured spec -->\n    <div data-reveal=\"\" style=\"opacity:0;transform:translateY(40px);transition:opacity .9s,transform .9s cubic-bezier(.2,.7,.2,1);border:1px solid rgba(23,24,28,0.8);background:#17181c;box-shadow:8px 8px 0 rgba(23,24,28,0.12);overflow:hidden;\">\n      <div style=\"display:flex;align-items:center;justify-content:space-between;gap:8px;padding:12px 18px;border-bottom:1px solid rgba(255,255,255,0.12);\">\n        <span style=\"font-family:'IBM Plex Mono',ui-monospace,monospace;font-size:12px;color:rgba(255,255,255,0.6);\">// resolution_loop.yaml<\u002Fspan>\n        <span style=\"font-family:'IBM Plex Mono',ui-monospace,monospace;font-size:10px;letter-spacing:0.1em;color:#5ad1e8;\">SPEC · VALIDATED<\u002Fspan>\n      <\u002Fdiv>\n      <pre style=\"margin:0;padding:24px 26px;font-family:'IBM Plex Mono',ui-monospace,monospace;font-size:13.5px;line-height:1.75;overflow-x:auto;color:rgba(255,255,255,0.82);\"><span style=\"color:#6cb6ff;\">loop<\u002Fspan>:\n  <span style=\"color:#6cb6ff;\">goal<\u002Fspan>: <span style=\"color:rgba(255,255,255,0.65);\">Resolve or triage dashboard loading issue<\u002Fspan>\n  <span style=\"color:#5ad1e8;\">context<\u002Fspan>:\n    - support_ticket\n    - customer_history\n    - app_logs\n    - recent_deploys\n  <span style=\"color:#b69cff;\">actions<\u002Fspan>:\n    - search_logs\n    - find_similar_incidents\n    - draft_resolution\n    - create_jira_ticket\n  <span style=\"color:#5ad1e8;\">evaluator<\u002Fspan>:\n    - evidence_required: <span style=\"color:#ffb340;\">true<\u002Fspan>\n    - confidence_threshold: <span style=\"color:#ffb340;\">0.8<\u002Fspan>\n    - risk_check: <span style=\"color:#ffb340;\">required<\u002Fspan>\n  <span style=\"color:#6cb6ff;\">memory<\u002Fspan>:\n    - store_failed_hypotheses\n    - store_successful_resolution\n  <span style=\"color:#ffb340;\">stop_conditions<\u002Fspan>:\n    - resolved\n    - confidence_below_threshold\n    - max_attempts: <span style=\"color:#ffb340;\">3<\u002Fspan>\n  <span style=\"color:#ffb340;\">human_review<\u002Fspan>:\n    - required_for_customer_facing_reply\n    - required_for_production_change<\u002Fpre>\n    <\u002Fdiv>\n    <div data-reveal=\"\" style=\"opacity:0;transition:opacity .8s;display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin-top:24px;\">\n      <span style=\"font-family:'IBM Plex Mono',ui-monospace,monospace;font-size:11px;padding:7px 13px;border:1px solid rgba(14,95,216,0.35);background:rgba(14,95,216,0.05);color:#0e5fd8;\">goal → intent<\u002Fspan>\n      <span style=\"font-family:'IBM Plex Mono',ui-monospace,monospace;font-size:11px;padding:7px 13px;border:1px solid rgba(15,138,157,0.35);background:rgba(15,138,157,0.05);color:#0f8a9d;\">context → memory<\u002Fspan>\n      <span style=\"font-family:'IBM Plex Mono',ui-monospace,monospace;font-size:11px;padding:7px 13px;border:1px solid rgba(90,85,214,0.35);background:rgba(90,85,214,0.05);color:#5a55d6;\">actions → tools<\u002Fspan>\n      <span style=\"font-family:'IBM Plex Mono',ui-monospace,monospace;font-size:11px;padding:7px 13px;border:1px solid rgba(185,119,0,0.4);background:rgba(185,119,0,0.06);color:#b97700;\">stop + review → safety<\u002Fspan>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ░░ 6 · HOW TO USE ░░ -->\n  <section id=\"howto\" style=\"background:#ebeae4;border-top:1px solid rgba(23,24,28,0.12);border-bottom:1px solid rgba(23,24,28,0.12);\">\n   <div style=\"position:relative;padding:clamp(70px,11vh,130px) clamp(22px,6vw,40px);max-width:1140px;margin:0 auto;\">\n    <div data-reveal=\"\" style=\"opacity:0;transform:translateY(28px);transition:opacity .9s cubic-bezier(.2,.7,.2,1),transform .9s cubic-bezier(.2,.7,.2,1);text-align:center;margin-bottom:50px;\">\n      <div style=\"font-family:'IBM Plex Mono',ui-monospace,monospace;font-size:12px;letter-spacing:0.14em;color:#0e5fd8;margin-bottom:14px;\">EXP.06 — PRACTICE<\u002Fdiv>\n      <h2 style=\"font-weight:700;font-size:clamp(30px,4.6vw,50px);line-height:1.08;letter-spacing:-0.02em;margin:0;\">How to use it, practically<\u002Fh2>\n    <\u002Fdiv>\n    <div style=\"display:grid;grid-template-columns:repeat(auto-fit,minmax(290px,1fr));gap:14px;margin-bottom:36px;\">\n      <div data-reveal=\"\" data-reveal-delay=\"0\" style=\"opacity:0;transform:translateY(40px);transition:opacity .8s,transform .8s cubic-bezier(.2,.7,.2,1),border-color .25s;position:relative;border:1px solid rgba(23,24,28,0.16);background:#fcfcfa;padding:22px 22px 22px 66px;\" style-hover=\"border-color:rgba(14,95,216,0.6);\">\n        <span style=\"position:absolute;left:20px;top:22px;font-family:'IBM Plex Mono',ui-monospace,monospace;font-weight:600;font-size:20px;color:#0e5fd8;\">1.<\u002Fspan>\n        <h3 style=\"font-weight:600;font-size:19px;letter-spacing:-0.01em;margin:0 0 7px;\">Define the goal<\u002Fh3>\n        <p style=\"font-size:14.5px;color:#5c5e66;line-height:1.5;margin:0;\">Do not start with a prompt. Start with the outcome.<\u002Fp>\n      <\u002Fdiv>\n      <div data-reveal=\"\" data-reveal-delay=\"70\" style=\"opacity:0;transform:translateY(40px);transition:opacity .8s,transform .8s cubic-bezier(.2,.7,.2,1),border-color .25s;position:relative;border:1px solid rgba(23,24,28,0.16);background:#fcfcfa;padding:22px 22px 22px 66px;\" style-hover=\"border-color:rgba(15,138,157,0.6);\">\n        <span style=\"position:absolute;left:20px;top:22px;font-family:'IBM Plex Mono',ui-monospace,monospace;font-weight:600;font-size:20px;color:#0f8a9d;\">2.<\u002Fspan>\n        <h3 style=\"font-weight:600;font-size:19px;letter-spacing:-0.01em;margin:0 0 7px;\">Define the loop steps<\u002Fh3>\n        <p style=\"font-size:14.5px;color:#5c5e66;line-height:1.5;margin:0;\">What should happen repeatedly?<\u002Fp>\n      <\u002Fdiv>\n      <div data-reveal=\"\" data-reveal-delay=\"140\" style=\"opacity:0;transform:translateY(40px);transition:opacity .8s,transform .8s cubic-bezier(.2,.7,.2,1),border-color .25s;position:relative;border:1px solid rgba(23,24,28,0.16);background:#fcfcfa;padding:22px 22px 22px 66px;\" style-hover=\"border-color:rgba(90,85,214,0.6);\">\n        <span style=\"position:absolute;left:20px;top:22px;font-family:'IBM Plex Mono',ui-monospace,monospace;font-weight:600;font-size:20px;color:#5a55d6;\">3.<\u002Fspan>\n        <h3 style=\"font-weight:600;font-size:19px;letter-spacing:-0.01em;margin:0 0 7px;\">Define available tools<\u002Fh3>\n        <p style=\"font-size:14.5px;color:#5c5e66;line-height:1.5;margin:0;\">What can the agent read, write, search, test, or update?<\u002Fp>\n      <\u002Fdiv>\n      <div data-reveal=\"\" data-reveal-delay=\"40\" style=\"opacity:0;transform:translateY(40px);transition:opacity .8s,transform .8s cubic-bezier(.2,.7,.2,1),border-color .25s;position:relative;border:1px solid rgba(23,24,28,0.16);background:#fcfcfa;padding:22px 22px 22px 66px;\" style-hover=\"border-color:rgba(15,138,157,0.6);\">\n        <span style=\"position:absolute;left:20px;top:22px;font-family:'IBM Plex Mono',ui-monospace,monospace;font-weight:600;font-size:20px;color:#0f8a9d;\">4.<\u002Fspan>\n        <h3 style=\"font-weight:600;font-size:19px;letter-spacing:-0.01em;margin:0 0 7px;\">Define evaluation criteria<\u002Fh3>\n        <p style=\"font-size:14.5px;color:#5c5e66;line-height:1.5;margin:0;\">What makes the answer acceptable?<\u002Fp>\n      <\u002Fdiv>\n      <div data-reveal=\"\" data-reveal-delay=\"110\" style=\"opacity:0;transform:translateY(40px);transition:opacity .8s,transform .8s cubic-bezier(.2,.7,.2,1),border-color .25s;position:relative;border:1px solid rgba(23,24,28,0.16);background:#fcfcfa;padding:22px 22px 22px 66px;\" style-hover=\"border-color:rgba(14,95,216,0.6);\">\n        <span style=\"position:absolute;left:20px;top:22px;font-family:'IBM Plex Mono',ui-monospace,monospace;font-weight:600;font-size:20px;color:#0e5fd8;\">5.<\u002Fspan>\n        <h3 style=\"font-weight:600;font-size:19px;letter-spacing:-0.01em;margin:0 0 7px;\">Define memory<\u002Fh3>\n        <p style=\"font-size:14.5px;color:#5c5e66;line-height:1.5;margin:0;\">What should the system remember across attempts?<\u002Fp>\n      <\u002Fdiv>\n      <div data-reveal=\"\" data-reveal-delay=\"180\" style=\"opacity:0;transform:translateY(40px);transition:opacity .8s,transform .8s cubic-bezier(.2,.7,.2,1),border-color .25s;position:relative;border:1px solid rgba(23,24,28,0.16);background:#fcfcfa;padding:22px 22px 22px 66px;\" style-hover=\"border-color:rgba(185,119,0,0.6);\">\n        <span style=\"position:absolute;left:20px;top:22px;font-family:'IBM Plex Mono',ui-monospace,monospace;font-weight:600;font-size:20px;color:#b97700;\">6.<\u002Fspan>\n        <h3 style=\"font-weight:600;font-size:19px;letter-spacing:-0.01em;margin:0 0 7px;\">Define stop conditions<\u002Fh3>\n        <p style=\"font-size:14.5px;color:#5c5e66;line-height:1.5;margin:0;\">When does the loop stop, retry, escalate, or fail safely?<\u002Fp>\n      <\u002Fdiv>\n      <div data-reveal=\"\" data-reveal-delay=\"250\" style=\"opacity:0;transform:translateY(40px);transition:opacity .8s,transform .8s cubic-bezier(.2,.7,.2,1),border-color .25s;position:relative;border:1px solid rgba(185,119,0,0.4);background:#fcfcfa;padding:22px 22px 22px 66px;grid-column:1/-1;\" style-hover=\"border-color:rgba(185,119,0,0.7);\">\n        <span style=\"position:absolute;left:20px;top:22px;font-family:'IBM Plex Mono',ui-monospace,monospace;font-weight:600;font-size:20px;color:#b97700;\">7.<\u002Fspan>\n        <h3 style=\"font-weight:600;font-size:19px;letter-spacing:-0.01em;margin:0 0 7px;\">Keep humans at control points<\u002Fh3>\n        <p style=\"font-size:14.5px;color:#5c5e66;line-height:1.5;margin:0;\">Use human approval for risky, irreversible, customer-facing, or production actions.<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <!-- the 7 combine into one loop -->\n    <div data-reveal=\"\" style=\"opacity:0;transform:translateY(40px);transition:opacity .9s,transform .9s cubic-bezier(.2,.7,.2,1);display:flex;flex-direction:column;align-items:center;gap:20px;padding:44px 24px;border:1px solid rgba(23,24,28,0.18);background:#fcfcfa;\">\n      <div style=\"font-family:'IBM Plex Mono',ui-monospace,monospace;font-size:11px;font-weight:600;letter-spacing:0.12em;color:#0e5fd8;\">SEVEN DECISIONS → ONE WORKING LOOP<\u002Fdiv>\n      <div data-loop=\"\" data-loop-dur=\"6\" data-loop-r=\"40\" style=\"position:relative;width:min(300px,72vw);aspect-ratio:1;\">\n        <svg viewBox=\"0 0 100 100\" style=\"position:absolute;inset:0;width:100%;height:100%;overflow:visible;\">\n          <circle cx=\"50\" cy=\"50\" r=\"40\" fill=\"none\" stroke=\"rgba(23,24,28,0.12)\" stroke-width=\"0.4\" stroke-dasharray=\"1.5 2\"><\u002Fcircle>\n          <circle cx=\"50\" cy=\"50\" r=\"40\" fill=\"none\" stroke=\"rgba(14,95,216,0.45)\" stroke-width=\"0.7\"><\u002Fcircle>\n        <\u002Fsvg>\n        <div style=\"position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-weight:600;font-size:15px;color:#17181c;text-align:center;letter-spacing:-0.01em;\">Self<br>running<\u002Fdiv>\n        <div data-loop-node=\"\" data-color=\"#0e5fd8\" style=\"position:absolute;left:50%;top:10%;transform:translate(-50%,-50%);\"><div data-node-core=\"\" style=\"width:13px;height:13px;border-radius:50%;background:rgba(14,95,216,0.16);border:1.5px solid rgba(14,95,216,0.6);\"><\u002Fdiv><\u002Fdiv>\n        <div data-loop-node=\"\" data-color=\"#0f8a9d\" style=\"position:absolute;left:84.64%;top:30%;transform:translate(-50%,-50%);\"><div data-node-core=\"\" style=\"width:13px;height:13px;border-radius:50%;background:rgba(15,138,157,0.16);border:1.5px solid rgba(15,138,157,0.6);\"><\u002Fdiv><\u002Fdiv>\n        <div data-loop-node=\"\" data-color=\"#5a55d6\" style=\"position:absolute;left:84.64%;top:70%;transform:translate(-50%,-50%);\"><div data-node-core=\"\" style=\"width:13px;height:13px;border-radius:50%;background:rgba(90,85,214,0.16);border:1.5px solid rgba(90,85,214,0.6);\"><\u002Fdiv><\u002Fdiv>\n        <div data-loop-node=\"\" data-color=\"#0e5fd8\" style=\"position:absolute;left:50%;top:90%;transform:translate(-50%,-50%);\"><div data-node-core=\"\" style=\"width:13px;height:13px;border-radius:50%;background:rgba(14,95,216,0.16);border:1.5px solid rgba(14,95,216,0.6);\"><\u002Fdiv><\u002Fdiv>\n        <div data-loop-node=\"\" data-color=\"#0f8a9d\" style=\"position:absolute;left:15.36%;top:70%;transform:translate(-50%,-50%);\"><div data-node-core=\"\" style=\"width:13px;height:13px;border-radius:50%;background:rgba(15,138,157,0.16);border:1.5px solid rgba(15,138,157,0.6);\"><\u002Fdiv><\u002Fdiv>\n        <div data-loop-node=\"\" data-color=\"#b97700\" style=\"position:absolute;left:15.36%;top:30%;transform:translate(-50%,-50%);\"><div data-node-core=\"\" style=\"width:13px;height:13px;border-radius:50%;background:rgba(185,119,0,0.16);border:1.5px solid rgba(185,119,0,0.6);\"><\u002Fdiv><\u002Fdiv>\n        <div data-loop-particle=\"\" style=\"position:absolute;left:50%;top:10%;width:10px;height:10px;border-radius:50%;background:#0e5fd8;transform:translate(-50%,-50%);box-shadow:0 0 14px 3px rgba(14,95,216,0.45);\"><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n   <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ░░ 7 · BAD vs GOOD LOOP ░░ -->\n  <section style=\"position:relative;padding:clamp(70px,11vh,130px) clamp(22px,6vw,40px);max-width:1140px;margin:0 auto;\">\n    <div data-reveal=\"\" style=\"opacity:0;transform:translateY(28px);transition:opacity .9s cubic-bezier(.2,.7,.2,1),transform .9s cubic-bezier(.2,.7,.2,1);text-align:center;margin-bottom:50px;\">\n      <div style=\"font-family:'IBM Plex Mono',ui-monospace,monospace;font-size:12px;letter-spacing:0.14em;color:#b97700;margin-bottom:14px;\">EXP.07 — GUARDRAILS<\u002Fdiv>\n      <h2 style=\"font-weight:700;font-size:clamp(30px,4.6vw,50px);line-height:1.08;letter-spacing:-0.02em;margin:0;\">A loop without limits is a liability<\u002Fh2>\n    <\u002Fdiv>\n    <div style=\"display:grid;grid-template-columns:repeat(auto-fit,minmax(320px,1fr));gap:18px;\">\n      <!-- BAD -->\n      <div data-reveal=\"\" style=\"opacity:0;transform:translateY(40px);transition:opacity .9s,transform .9s cubic-bezier(.2,.7,.2,1);border:1px solid rgba(205,58,47,0.4);background:#fcfcfa;padding:32px 30px;\">\n        <div style=\"display:flex;align-items:center;justify-content:space-between;margin-bottom:22px;gap:16px;\">\n          <div><span style=\"font-family:'IBM Plex Mono',ui-monospace,monospace;font-size:10px;font-weight:600;letter-spacing:0.12em;color:#cd3a2f;\">BAD LOOP · FAIL<\u002Fspan><h3 style=\"font-weight:600;font-size:22px;letter-spacing:-0.01em;margin:6px 0 0;\">“Keep trying until it works.”<\u002Fh3><\u002Fdiv>\n          <div style=\"position:relative;width:72px;height:72px;flex:0 0 auto;\">\n            <div style=\"position:absolute;inset:0;border-radius:50%;border:2px dashed rgba(205,58,47,0.55);animation:spinFast 0.7s linear infinite;\"><\u002Fdiv>\n            <div style=\"position:absolute;inset:0;animation:wobbleBad 1.1s ease-in-out infinite;\"><div style=\"position:absolute;top:-4px;left:50%;width:9px;height:9px;margin-left:-4.5px;border-radius:50%;background:#cd3a2f;box-shadow:0 0 10px 2px rgba(205,58,47,0.6);\"><\u002Fdiv><\u002Fdiv>\n            <div style=\"position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-family:'IBM Plex Mono',ui-monospace,monospace;font-size:18px;color:#cd3a2f;\">!<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"display:flex;flex-direction:column;gap:10px;\">\n          <div style=\"display:flex;align-items:center;gap:11px;font-size:15px;color:#17181c;\"><span style=\"color:#cd3a2f;font-family:'IBM Plex Mono',ui-monospace,monospace;font-weight:600;\">✕<\u002Fspan>No stop condition<\u002Fdiv>\n          <div style=\"display:flex;align-items:center;gap:11px;font-size:15px;color:#17181c;\"><span style=\"color:#cd3a2f;font-family:'IBM Plex Mono',ui-monospace,monospace;font-weight:600;\">✕<\u002Fspan>No budget limit<\u002Fdiv>\n          <div style=\"display:flex;align-items:center;gap:11px;font-size:15px;color:#17181c;\"><span style=\"color:#cd3a2f;font-family:'IBM Plex Mono',ui-monospace,monospace;font-weight:600;\">✕<\u002Fspan>No evaluator<\u002Fdiv>\n          <div style=\"display:flex;align-items:center;gap:11px;font-size:15px;color:#17181c;\"><span style=\"color:#cd3a2f;font-family:'IBM Plex Mono',ui-monospace,monospace;font-weight:600;\">✕<\u002Fspan>No human review<\u002Fdiv>\n          <div style=\"display:flex;align-items:center;gap:11px;font-size:15px;color:#17181c;\"><span style=\"color:#cd3a2f;font-family:'IBM Plex Mono',ui-monospace,monospace;font-weight:600;\">✕<\u002Fspan>No memory<\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"margin-top:22px;padding:12px 15px;border:1px solid rgba(205,58,47,0.35);background:rgba(205,58,47,0.05);font-size:13.5px;color:#a52a20;line-height:1.45;\">Can spiral, burn budget, or take risky, irreversible actions.<\u002Fdiv>\n      <\u002Fdiv>\n      <!-- GOOD -->\n      <div data-reveal=\"\" data-reveal-delay=\"120\" style=\"opacity:0;transform:translateY(40px);transition:opacity .9s,transform .9s cubic-bezier(.2,.7,.2,1);border:1px solid rgba(30,138,74,0.4);background:#fcfcfa;padding:32px 30px;\">\n        <div style=\"display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:22px;gap:16px;\">\n          <div><span style=\"font-family:'IBM Plex Mono',ui-monospace,monospace;font-size:10px;font-weight:600;letter-spacing:0.12em;color:#1e8a4a;\">GOOD LOOP · PASS<\u002Fspan><h3 style=\"font-weight:600;font-size:22px;letter-spacing:-0.01em;margin:6px 0 0;line-height:1.25;\">“Try up to 3 times, use evidence, evaluate, ask a human if risky.”<\u002Fh3><\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"display:flex;align-items:center;gap:18px;margin-bottom:20px;\">\n          <div style=\"position:relative;width:72px;height:72px;flex:0 0 auto;\">\n            <div style=\"position:absolute;inset:0;border-radius:50%;border:2px solid rgba(30,138,74,0.4);\"><\u002Fdiv>\n            <div style=\"position:absolute;inset:0;animation:spinSlow 5s linear infinite;\"><div style=\"position:absolute;top:-4px;left:50%;width:9px;height:9px;margin-left:-4.5px;border-radius:50%;background:#1e8a4a;box-shadow:0 0 10px 2px rgba(30,138,74,0.55);\"><\u002Fdiv><\u002Fdiv>\n            <div style=\"position:absolute;top:50%;left:-2px;width:6px;height:6px;margin-top:-3px;border-radius:50%;background:#1e8a4a;\"><\u002Fdiv>\n            <div style=\"position:absolute;top:50%;right:-2px;width:6px;height:6px;margin-top:-3px;border-radius:50%;background:#1e8a4a;\"><\u002Fdiv>\n            <div style=\"position:absolute;bottom:-2px;left:50%;width:6px;height:6px;margin-left:-3px;border-radius:50%;background:#1e8a4a;\"><\u002Fdiv>\n            <div style=\"position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-family:'IBM Plex Mono',ui-monospace,monospace;font-size:16px;color:#1e8a4a;\">✓<\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"font-family:'IBM Plex Mono',ui-monospace,monospace;font-size:11px;color:#1e8a4a;line-height:1.7;letter-spacing:0.06em;\">CHECKPOINTS<br>EVERY CYCLE<\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"display:flex;flex-direction:column;gap:10px;\">\n          <div style=\"display:flex;align-items:center;gap:11px;font-size:15px;color:#17181c;\"><span style=\"color:#1e8a4a;font-family:'IBM Plex Mono',ui-monospace,monospace;font-weight:600;\">✓<\u002Fspan>Bounded &amp; budgeted<\u002Fdiv>\n          <div style=\"display:flex;align-items:center;gap:11px;font-size:15px;color:#17181c;\"><span style=\"color:#1e8a4a;font-family:'IBM Plex Mono',ui-monospace,monospace;font-weight:600;\">✓<\u002Fspan>Auditable<\u002Fdiv>\n          <div style=\"display:flex;align-items:center;gap:11px;font-size:15px;color:#17181c;\"><span style=\"color:#1e8a4a;font-family:'IBM Plex Mono',ui-monospace,monospace;font-weight:600;\">✓<\u002Fspan>Safer<\u002Fdiv>\n          <div style=\"display:flex;align-items:center;gap:11px;font-size:15px;color:#17181c;\"><span style=\"color:#1e8a4a;font-family:'IBM Plex Mono',ui-monospace,monospace;font-weight:600;\">✓<\u002Fspan>More useful<\u002Fdiv>\n          <div style=\"display:flex;align-items:center;gap:11px;font-size:15px;color:#17181c;\"><span style=\"color:#1e8a4a;font-family:'IBM Plex Mono',ui-monospace,monospace;font-weight:600;\">✓<\u002Fspan>Easier to debug<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ░░ 8 · MENTAL MODEL ░░ -->\n  <section style=\"background:#ebeae4;border-top:1px solid rgba(23,24,28,0.12);\">\n   <div style=\"position:relative;padding:clamp(80px,12vh,150px) clamp(22px,6vw,40px) clamp(64px,9vh,110px);max-width:1140px;margin:0 auto;text-align:center;\">\n    <h2 data-reveal=\"\" style=\"opacity:0;transform:translateY(28px);transition:opacity .9s cubic-bezier(.2,.7,.2,1),transform .9s cubic-bezier(.2,.7,.2,1);font-weight:700;font-size:clamp(32px,5.2vw,58px);line-height:1.08;letter-spacing:-0.025em;margin:0 auto 18px;max-width:880px;\">Think less like a prompt writer.<br><span style=\"color:#0e5fd8;\">Think more like a systems designer.<\u002Fspan><\u002Fh2>\n\n    <div data-reveal=\"\" data-reveal-delay=\"100\" style=\"opacity:0;transform:translateY(28px);transition:opacity .9s,transform .9s;display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:14px;max-width:760px;margin:42px auto 60px;\">\n      <div style=\"padding:24px;border:1px solid rgba(14,95,216,0.35);background:#fcfcfa;\"><div style=\"font-weight:600;font-size:18px;color:#0e5fd8;letter-spacing:-0.01em;\">Design the loop<\u002Fdiv><\u002Fdiv>\n      <div style=\"padding:24px;border:1px solid rgba(90,85,214,0.35);background:#fcfcfa;\"><div style=\"font-weight:600;font-size:18px;color:#5a55d6;letter-spacing:-0.01em;\">Control the tools<\u002Fdiv><\u002Fdiv>\n      <div style=\"padding:24px;border:1px solid rgba(185,119,0,0.4);background:#fcfcfa;\"><div style=\"font-weight:600;font-size:18px;color:#b97700;letter-spacing:-0.01em;\">Define the exit<\u002Fdiv><\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- human outside the loop -->\n    <div data-reveal=\"\" style=\"opacity:0;transform:translateY(40px);transition:opacity 1s,transform 1s cubic-bezier(.2,.7,.2,1);display:flex;flex-wrap:wrap;align-items:center;justify-content:center;gap:clamp(24px,5vw,64px);margin-bottom:62px;\">\n      <div style=\"display:flex;flex-direction:column;align-items:center;gap:14px;max-width:230px;\">\n        <div style=\"width:84px;height:84px;border:1px solid rgba(23,24,28,0.2);background:#fcfcfa;display:flex;align-items:center;justify-content:center;\">\n          <svg xmlns=\"http://www.w3.org/2000/svg\" width=\"38\" height=\"38\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#0e5fd8\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2\"><\u002Fpath><circle cx=\"12\" cy=\"7\" r=\"4\"><\u002Fcircle><\u002Fsvg>\n        <\u002Fdiv>\n        <div style=\"font-family:'IBM Plex Mono',ui-monospace,monospace;font-size:10.5px;font-weight:600;letter-spacing:0.1em;color:#0e5fd8;\">YOU · DESIGNER / DEVELOPER<\u002Fdiv>\n        <div style=\"font-size:13.5px;color:#5c5e66;line-height:1.5;text-align:center;\">Owns the goal, rules, review points, and stop conditions.<\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"font-size:24px;color:#a7a8ad;\">→<\u002Fdiv>\n      <div data-loop=\"\" data-loop-dur=\"7\" data-loop-r=\"40\" style=\"position:relative;width:min(260px,66vw);aspect-ratio:1;\">\n        <svg viewBox=\"0 0 100 100\" style=\"position:absolute;inset:0;width:100%;height:100%;overflow:visible;\">\n          <circle cx=\"50\" cy=\"50\" r=\"40\" fill=\"none\" stroke=\"rgba(23,24,28,0.12)\" stroke-width=\"0.4\" stroke-dasharray=\"1.5 2\"><\u002Fcircle>\n          <circle cx=\"50\" cy=\"50\" r=\"40\" fill=\"none\" stroke=\"rgba(14,95,216,0.45)\" stroke-width=\"0.7\"><\u002Fcircle>\n        <\u002Fsvg>\n        <div style=\"position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-family:'IBM Plex Mono',ui-monospace,monospace;font-size:11px;font-weight:600;letter-spacing:0.08em;color:#5c5e66;text-align:center;\">AGENT<br>RUNS IT<\u002Fdiv>\n        <div data-loop-node=\"\" data-color=\"#0e5fd8\" style=\"position:absolute;left:50%;top:10%;transform:translate(-50%,-50%);\"><div data-node-core=\"\" style=\"width:12px;height:12px;border-radius:50%;background:rgba(14,95,216,0.16);border:1.5px solid rgba(14,95,216,0.6);\"><\u002Fdiv><\u002Fdiv>\n        <div data-loop-node=\"\" data-color=\"#0f8a9d\" style=\"position:absolute;left:84.64%;top:30%;transform:translate(-50%,-50%);\"><div data-node-core=\"\" style=\"width:12px;height:12px;border-radius:50%;background:rgba(15,138,157,0.16);border:1.5px solid rgba(15,138,157,0.6);\"><\u002Fdiv><\u002Fdiv>\n        <div data-loop-node=\"\" data-color=\"#5a55d6\" style=\"position:absolute;left:84.64%;top:70%;transform:translate(-50%,-50%);\"><div data-node-core=\"\" style=\"width:12px;height:12px;border-radius:50%;background:rgba(90,85,214,0.16);border:1.5px solid rgba(90,85,214,0.6);\"><\u002Fdiv><\u002Fdiv>\n        <div data-loop-node=\"\" data-color=\"#0e5fd8\" style=\"position:absolute;left:50%;top:90%;transform:translate(-50%,-50%);\"><div data-node-core=\"\" style=\"width:12px;height:12px;border-radius:50%;background:rgba(14,95,216,0.16);border:1.5px solid rgba(14,95,216,0.6);\"><\u002Fdiv><\u002Fdiv>\n
