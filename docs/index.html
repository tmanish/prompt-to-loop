nt 68%);pointer-events:none;\"><\u002Fdiv>\n    <div style=\"position:relative;padding:clamp(74px,11vh,132px) clamp(22px,6vw,40px);max-width:1060px;margin:0 auto;\">\n\n      <div data-reveal=\"\" style=\"opacity:0;transform:translateY(28px);transition:opacity .9s cubic-bezier(.2,.7,.2,1),transform .9s cubic-bezier(.2,.7,.2,1);text-align:center;margin-bottom:52px;\">\n        <div style=\"display:inline-flex;align-items:center;gap:9px;font-family:'IBM Plex Mono',ui-monospace,monospace;font-size:12px;letter-spacing:0.14em;color:#5ad1e8;border:1px solid rgba(90,209,232,0.35);background:rgba(90,209,232,0.06);padding:7px 14px;margin-bottom:22px;\"><span style=\"width:6px;height:6px;background:#5ad1e8;animation:blink 1.8s ease-in-out infinite;\"><\u002Fspan>EXP.08 — RUN IT YOURSELF<\u002Fdiv>\n        <h2 style=\"font-weight:700;font-size:clamp(31px,4.7vw,52px);line-height:1.07;letter-spacing:-0.02em;margin:0 0 18px;\">Try the <span style=\"color:#5ad1e8;\">prompt-to-loop<\u002Fspan> skill<\u002Fh2>\n        <p style=\"font-size:18px;line-height:1.52;color:rgba(255,255,255,0.6);max-width:660px;margin:0 auto;\">A Claude skill that turns any vague build prompt into a running loop — a stated goal, mechanical verification, bounded iteration, and a publishable log. No technical knowledge needed.<\u002Fp>\n      <\u002Fdiv>\n\n      <!-- three steps -->\n      <div style=\"display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:14px;margin-bottom:36px;\">\n        <div data-reveal=\"\" data-reveal-delay=\"0\" style=\"opacity:0;transform:translateY(40px);transition:opacity .8s,transform .8s cubic-bezier(.2,.7,.2,1),border-color .25s;position:relative;border:1px solid rgba(255,255,255,0.14);background:rgba(255,255,255,0.03);padding:26px 24px 24px;\" style-hover=\"border-color:rgba(90,209,232,0.6);\">\n          <div style=\"display:flex;align-items:center;gap:12px;margin-bottom:14px;\"><span style=\"width:34px;height:34px;flex:0 0 auto;display:flex;align-items:center;justify-content:center;background:rgba(90,209,232,0.1);border:1px solid rgba(90,209,232,0.4);color:#5ad1e8;font-family:'IBM Plex Mono',ui-monospace,monospace;font-weight:600;font-size:14px;\">1<\u002Fspan><h3 style=\"font-weight:600;font-size:20px;letter-spacing:-0.01em;margin:0;\">Download<\u002Fh3><\u002Fdiv>\n          <p style=\"font-size:14.5px;color:rgba(255,255,255,0.62);line-height:1.55;margin:0 0 14px;\">Grab the packaged skill file. It downloads like any normal file.<\u002Fp>\n          <div style=\"font-family:'IBM Plex Mono',ui-monospace,monospace;font-size:12px;color:#5ad1e8;padding:9px 12px;border:1px dashed rgba(90,209,232,0.35);background:rgba(90,209,232,0.05);word-break:break-all;\">dist/prompt-to-loop.skill<\u002Fdiv>\n        <\u002Fdiv>\n        <div data-reveal=\"\" data-reveal-delay=\"90\" style=\"opacity:0;transform:translateY(40px);transition:opacity .8s,transform .8s cubic-bezier(.2,.7,.2,1),border-color .25s;position:relative;border:1px solid rgba(255,255,255,0.14);background:rgba(255,255,255,0.03);padding:26px 24px 24px;\" style-hover=\"border-color:rgba(15,138,157,0.7);\">\n          <div style=\"display:flex;align-items:center;gap:12px;margin-bottom:14px;\"><span style=\"width:34px;height:34px;flex:0 0 auto;display:flex;align-items:center;justify-content:center;background:rgba(15,138,157,0.14);border:1px solid rgba(15,138,157,0.5);color:#3fb6c9;font-family:'IBM Plex Mono',ui-monospace,monospace;font-weight:600;font-size:14px;\">2<\u002Fspan><h3 style=\"font-weight:600;font-size:20px;letter-spacing:-0.01em;margin:0;\">Upload to Claude<\u002Fh3><\u002Fdiv>\n          <p style=\"font-size:14.5px;color:rgba(255,255,255,0.62);line-height:1.55;margin:0;\">Open <span style=\"color:#f4f3ef;\">Customize › Skills<\u002Fspan> (or Settings › Capabilities › Skills), hit <span style=\"color:#f4f3ef;\">+<\u002Fspan>, and upload the file. If it only takes <span style=\"font-family:'IBM Plex Mono',ui-monospace,monospace;color:#3fb6c9;\">.zip<\u002Fspan>, just rename it first — the contents are identical.<\u002Fp>\n        <\u002Fdiv>\n        <div data-reveal=\"\" data-reveal-delay=\"180\" style=\"opacity:0;transform:translateY(40px);transition:opacity .8s,transform .8s cubic-bezier(.2,.7,.2,1),border-color .25s;position:relative;border:1px solid rgba(255,255,255,0.14);background:rgba(255,255,255,0.03);padding:26px 24px 24px;\" style-hover=\"border-color:rgba(185,119,0,0.7);\">\n          <div style=\"display:flex;align-items:center;gap:12px;margin-bottom:14px;\"><span style=\"width:34px;height:34px;flex:0 0 auto;display:flex;align-items:center;justify-content:center;background:rgba(185,119,0,0.14);border:1px solid rgba(185,119,0,0.5);color:#e0a53a;font-family:'IBM Plex Mono',ui-monospace,monospace;font-weight:600;font-size:14px;\">3<\u002Fspan><h3 style=\"font-weight:600;font-size:20px;letter-spacing:-0.01em;margin:0;\">Switch it on<\u002Fh3><\u002Fdiv>\n          <p style=\"font-size:14.5px;color:rgba(255,255,255,0.62);line-height:1.55;margin:0;\">Toggle the skill on in your list, and make sure <span style=\"color:#f4f3ef;\">Code execution &amp; file creation<\u002Fspan> is enabled — skills need it to run.<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <!-- then just ask -->\n      <div data-reveal=\"\" data-reveal-delay=\"60\" style=\"opacity:0;transform:translateY(34px);transition:opacity .9s,transform .9s cubic-bezier(.2,.7,.2,1);border:1px solid rgba(90,209,232,0.3);background:rgba(90,209,232,0.05);padding:24px 26px;margin-bottom:40px;display:flex;flex-wrap:wrap;align-items:center;gap:16px 22px;\">\n        <div style=\"font-family:'IBM Plex Mono',ui-monospace,monospace;font-size:11px;font-weight:600;letter-spacing:0.12em;color:#5ad1e8;flex:0 0 auto;\">THEN — JUST ASK<\u002Fdiv>\n        <div style=\"flex:1;min-width:240px;font-size:16.5px;line-height:1.5;color:rgba(255,255,255,0.82);\">No manual invocation needed. Say <span style=\"color:#f4f3ef;\">“build me a website for my bakery”<\u002Fspan> and the skill activates on its own — asking a few sharp questions, then looping to a verified result. To invoke it explicitly, type <span style=\"font-family:'IBM Plex Mono',ui-monospace,monospace;color:#5ad1e8;\">/prompt-to-loop<\u002Fspan> followed by your request.<\u002Fdiv>\n      <\u002Fdiv>\n\n      <!-- CTAs -->\n      <div data-reveal=\"\" style=\"opacity:0;transform:translateY(22px);transition:opacity .8s,transform .8s;display:flex;flex-wrap:wrap;gap:12px;justify-content:center;\">\n        <a href=\"https://github.com/tmanish/prompt-to-loop/raw/main/dist/prompt-to-loop.skill\" style=\"display:inline-flex;align-items:center;gap:8px;text-decoration:none;font-family:'IBM Plex Mono',ui-monospace,monospace;font-size:13px;letter-spacing:0.08em;color:#17181c;background:#5ad1e8;padding:14px 26px;border:1px solid #5ad1e8;transition:background .2s,border-color .2s;\" style-hover=\"background:#f4f3ef;border-color:#f4f3ef;\">↓ DOWNLOAD THE SKILL<\u002Fa>\n        <a href=\"https://github.com/tmanish/prompt-to-loop\" target=\"_blank\" rel=\"noopener\" style=\"display:inline-flex;align-items:center;gap:8px;text-decoration:none;font-family:'IBM Plex Mono',ui-monospace,monospace;font-size:13px;letter-spacing:0.08em;color:#f4f3ef;padding:14px 26px;border:1px solid rgba(255,255,255,0.3);background:transparent;transition:border-color .2s,background .2s;\" style-hover=\"border-color:#f4f3ef;background:rgba(255,255,255,0.06);\">VIEW ON GITHUB →<\u002Fa>\n      <\u002Fdiv>\n\n      <div style=\"margin-top:66px;padding-top:30px;border-top:1px solid rgba(255,255,255,0.14);display:flex;align-items:center;justify-content:center;gap:10px;font-family:'IBM Plex Mono',ui-monospace,monospace;font-size:11px;letter-spacing:0.06em;color:rgba(255,255,255,0.45);text-align:center;\">\n        <span style=\"width:6px;height:6px;background:#5ad1e8;flex:0 0 auto;\"><\u002Fspan>LOOP ENGINEERING · AN INTERACTIVE PRIMER BY MANISH TODKARI\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{\n  &quot;showGrid&quot;: { &quot;editor&quot;: &quot;boolean&quot;, &quot;default&quot;: true, &quot;tsType&quot;: &quot;boolean&quot;, &quot;section&quot;: &quot;Lab look&quot; },\n  &quot;loopSpeed&quot;: { &quot;editor&quot;: &quot;range&quot;, &quot;default&quot;: 1, &quot;min&quot;: 0.25, &quot;max&quot;: 3, &quot;step&quot;: 0.25, &quot;tsType&quot;: &quot;number&quot;, &quot;section&quot;: &quot;Animation&quot; }\n}\">\nclass Component extends DCLogic {\n  componentDidMount() {\n    this._t0 = performance.now();\n    this._raf = null;\n    this.setupReveal();\n    this.setupLoops();\n  }\n  componentWillUnmount() {\n    if (this._raf) cancelAnimationFrame(this._raf);\n    if (this._io) this._io.disconnect();\n    if (this._io2) this._io2.disconnect();\n  }\n\n  hex(a) {\n    return Math.round(Math.max(0, Math.min(1, a)) * 255).toString(16).padStart(2, '0');\n  }\n\n  rgb(h) {\n    h = h.replace('#', '');\n    return [parseInt(h.slice(0, 2), 16), parseInt(h.slice(2, 4), 16), parseInt(h.slice(4, 6), 16)];\n  }\n\n  mix(a, b, t) {\n    const pa = this.rgb(a), pb = this.rgb(b);\n    const r = Math.round(pa[0] + (pb[0] - pa[0]) * t);\n    const g = Math.round(pa[1] + (pb[1] - pa[1]) * t);\n    const bl = Math.round(pa[2] + (pb[2] - pa[2]) * t);\n    return `rgb(${r},${g},${bl})`;\n  }\n\n  setupReveal() {\n    const io = new IntersectionObserver((ents) => {\n      for (const e of ents) {\n        if (!e.isIntersecting) continue;\n        const el = e.target;\n        const delay = +(el.getAttribute('data-reveal-delay') || 0);\n        el.style.transitionDelay = delay + 'ms';\n        el.style.opacity = '1';\n        el.style.transform = 'none';\n        el.style.filter = 'none';\n        io.unobserve(el);\n      }\n    }, { threshold: 0.12, rootMargin: '0px 0px -7% 0px' });\n    this._io = io;\n    document.querySelectorAll('[data-reveal]').forEach((el) => io.observe(el));\n\n    const io2 = new IntersectionObserver((ents) => {\n      for (const e of ents) {\n        if (!e.isIntersecting) continue;\n        const el = e.target;\n        if (el.hasAttribute('data-draw')) el.style.strokeDashoffset = '0';\n        if (el.hasAttribute('data-grow')) {\n          const axis = el.getAttribute('data-grow-axis') || 'width';\n          el.style[axis] = el.getAttribute('data-grow');\n        }\n        if (el.hasAttribute('data-count')) this.countUp(el);\n        io2.unobserve(el);\n      }\n    }, { threshold: 0.35 });\n    this._io2 = io2;\n    document.querySelectorAll('[data-draw],[data-grow],[data-count]').forEach((el) => io2.observe(el));\n  }\n\n  countUp(el) {\n    const target = +el.getAttribute('data-count');\n    const suf = el.getAttribute('data-count-suffix') || '';\n    const dur = 1100, t0 = performance.now();\n    const step = (now) => {\n      const k = Math.min(1, (now - t0) / dur);\n      const e = 1 - Math.pow(1 - k, 3);\n      el.textContent = Math.round(target * e) + suf;\n      if (k < 1) requestAnimationFrame(step);\n    };\n    requestAnimationFrame(step);\n  }\n\n  setupLoops() {\n    const loops = [...document.querySelectorAll('[data-loop]')].map((c) => ({\n      particle: c.querySelector('[data-loop-particle]'),\n      nodes: [...c.querySelectorAll('[data-loop-node]')],\n      dur: +(c.getAttribute('data-loop-dur') || 8),\n      r: +(c.getAttribute('data-loop-r') || 42),\n    }));\n    this._loops = loops;\n\n    const tick = (now) => {\n      const t = (now - this._t0) / 1000;\n      const speed = +(this.props.loopSpeed ?? 1) || 1;\n      for (const lp of loops) {\n        const n = lp.nodes.length || 6;\n        const dur = lp.dur / speed;\n        const prog = (t % dur) / dur;\n        const pAng = -90 + prog * 360;\n        const rad = (pAng * Math.PI) / 180;\n        if (lp.particle) {\n          lp.particle.style.left = (50 + lp.r * Math.cos(rad)) + '%';\n          lp.particle.style.top = (50 + lp.r * Math.sin(rad)) + '%';\n        }\n        lp.nodes.forEach((node, i) => {\n          const nAng = -90 + i * (360 / n);\n          const d = Math.abs(((pAng - nAng + 540) % 360) - 180);\n          const k = Math.max(0, 1 - d / 52);\n          const kk = k * k;\n          const col = node.getAttribute('data-color') || '#0e5fd8';\n          const core = node.querySelector('[data-node-core]') || node;\n          core.style.boxShadow = `0 0 ${kk * 26}px ${kk * 7}px ${col}${this.hex(kk * 0.4)}`;\n          core.style.borderColor = `${col}${this.hex(0.55 + kk * 0.45)}`;\n          core.style.background = this.mix('#ffffff', col, kk * 0.9);\n          core.style.transform = `scale(${1 + kk * 0.26})`;\n          const lbl = node.querySelector('[data-node-label]');\n          if (lbl) lbl.style.color = `rgba(23,24,28,${0.42 + kk * 0.5})`;\n        });\n      }\n      this._raf = requestAnimationFrame(tick);\n    };\n    this._raf = requestAnimationFrame(tick);\n  }\n\n  renderVals() {\n    return {\n      showGrid: this.props.showGrid ?? true,\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
